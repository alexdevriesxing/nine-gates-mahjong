name = "nine-gates-mahjong"
main = "src/worker/index.ts"
compatibility_date = "2026-06-24"
routes = [
  { pattern = "ninegatesmahjong.com/*", zone_name = "ninegatesmahjong.com" },
  { pattern = "www.ninegatesmahjong.com/*", zone_name = "ninegatesmahjong.com" }
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[durable_objects.bindings]]
name = "MAHJONG_ROOM"
class_name = "MahjongRoom"

[[d1_databases]]
binding = "DB"
database_name = "nine-gates-mahjong"
database_id = "4cf5d1b8-ff49-43ec-af81-d5772ca9763f"
migrations_dir = "src/worker/db/migrations"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MahjongRoom"]

