<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="referrer" content="strict-origin-when-cross-origin">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }
</style>
</head>
<body>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const width = Number.parseInt(urlParams.get('w') || '0', 10);
  const height = Number.parseInt(urlParams.get('h') || '0', 10);
  const placement = urlParams.get('placement') || 'banner';
  document.body.dataset.placement = placement;
  document.documentElement.style.width = `${width}px`;
  document.documentElement.style.height = `${height}px`;
  document.body.style.width = `${width}px`;
  document.body.style.height = `${height}px`;

  const adConfig = {
    '320x50': { key: 'cdc33de3506804ba73d2d3661ed4fd0a' },
    '728x90': { key: '759777117285af8156ae217ed7fc2a0b' },
    '468x60': { key: '3d687f838f7b1a2353a56d39e059e906' },
    '300x250': { key: '933dafe9ee5494fdc3ed74bb4ad047a6' },
    '160x300': { key: '4492bd5c94522d00777227f98028a4c4' },
    '160x600': { key: 'f2411eb715b2fe1af0fafb73c5825345' },
  };

  const keyParam = urlParams.get('key');
  const sizeKey = `${width}x${height}`;
  const defaultConfig = adConfig[sizeKey];
  
  const finalKey = keyParam || (defaultConfig ? defaultConfig.key : null);
  const finalUrl = finalKey ? `https://demolishwrestconclusions.com/${finalKey}/invoke.js` : null;

  if (finalKey && finalUrl && width > 0 && height > 0) {
    window.atOptions = {
      'key': finalKey,
      'format': 'iframe',
      'height': height,
      'width': width,
      'params': {}
    };
    const script = document.createElement('script');
    script.dataset.cfasync = 'false';
    script.src = finalUrl;
    document.body.appendChild(script);
  }
</script>
</body>
</html>
