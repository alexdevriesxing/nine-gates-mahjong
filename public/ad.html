<!DOCTYPE html>
<html>
<head>
<style>body { margin: 0; padding: 0; background: transparent; overflow: hidden; display: flex; justify-content: center; align-items: center; }</style>
</head>
<body>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const key = urlParams.get('key');
  const width = urlParams.get('w');
  const height = urlParams.get('h');
  
  if (key) {
    window.atOptions = {
      'key' : key,
      'format' : 'iframe',
      'height' : parseInt(height),
      'width' : parseInt(width),
      'params' : {}
    };
    document.write('<script src="https://www.highperformanceformat.com/' + key + '/invoke.js"><\\/script>');
  }
</script>
</body>
</html>
