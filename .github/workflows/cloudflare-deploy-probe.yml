name: Cloudflare deployment probe

on:
  pull_request:
    paths:
      - .github/workflows/cloudflare-deploy-probe.yml

permissions:
  contents: read

concurrency:
  group: nine-gates-cloudflare-deployment-probe
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate Cloudflare credentials
        shell: bash
        run: |
          missing=0
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Repository secret CLOUDFLARE_API_TOKEN is not configured."
            missing=1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Repository secret CLOUDFLARE_ACCOUNT_ID is not configured."
            missing=1
          fi
          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build production assets
        run: npm run build

      - name: Apply idempotent D1 schema
        run: npx wrangler d1 execute DB --remote --file=src/worker/db/migrations/0001_initial.sql

      - name: Deploy Worker and static assets
        run: npx wrangler deploy
